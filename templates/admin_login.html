{% extends 'base.html' %}

{% block styles %}
<style>
  .admin-login-wrapper {
    min-height: calc(100vh - var(--header-height));
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-primary), var(--bg-tertiary));
    margin-top: var(--header-height);
  }
  
  .login-card {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 30px var(--shadow);
    text-align: center;
  }
  .login-card h2 {
    font-family: var(--font-display);
    font-size: 1.8rem;
    margin-bottom: 10px;
    font-weight: 600;
  }
</style>
{% endblock %}

{% block content %}
  <div class="admin-login-wrapper">
    <div class="login-card">
      <i class="fa-solid fa-user-lock" style="font-size: 3rem; color: var(--accent); margin-bottom: 20px;"></i>
      <h2>Admin Portal</h2>
      <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 30px;">Access key operations metrics and manage restaurant data.</p>
      
      <form id="admin-login-form">
        <div class="form-group" style="text-align: left;">
          <label for="admin-email">Email Address</label>
          <input type="email" id="admin-email" required placeholder="admin@gusto.com" value="admin@gusto.com">
        </div>
        
        <div class="form-group" style="text-align: left; margin-bottom: 30px;">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" required placeholder="••••••••" value="admin123">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Authorize Access</button>
      </form>
    </div>
  </div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('admin-login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('admin-email').value;
    const password = document.getElementById('admin-password').value;
    
    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        if (data.role === 'admin') {
          showToast('Authorization successful! Loading dashboard...', 'success');
          setTimeout(() => {
            window.location.href = '/admin/dashboard';
          }, 1000);
        } else {
          showToast('Access denied: Unauthorized role.', 'error');
          // Logout session
          fetch('/api/auth/logout');
        }
      } else {
        showToast(data.message, 'error');
      }
    })
    .catch(() => showToast('Failed to connect to authentication server', 'error'));
  });
</script>
{% endblock %}
